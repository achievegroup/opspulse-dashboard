function resolveColor(theme, key, meta) {
  const m = (meta || STATUS_META)[key];
  return m.color === "ACCENT" ? theme.accent : m.color;
}
 
function StatusBadge({ status, theme, meta }) {
  const metaSet = meta || STATUS_META;
  const item = metaSet[status];
  const color = resolveColor(theme, status, metaSet);
  return (
    <span
      style={{
        display: "inline-flex", alignItems: "center", gap: 6, padding: "4px 10px",
        borderRadius: 999, fontSize: 12, fontWeight: 600, color,
        backgroundColor: color + "1A", whiteSpace: "nowrap",
      }}
    >
      <span style={{ width: 6, height: 6, borderRadius: 999, backgroundColor: color }} />
      {item.label}
    </span>
  );
}
 
function KpiCard({ icon: Icon, label, value, sub, theme, tint }) {
  return (
    <div
      style={{
        background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 16,

    </div>
  );
}
 
/* ------------------------------------------------------------------ */
/* Thai date helpers (for PO monthly / weekly grouping)                */
/* ------------------------------------------------------------------ */
 
function parseThaiDate(str) {
  // รูปแบบที่รองรับ: "18 ก.ค. 2569"
  if (!str) return null;
  const parts = str.trim().split(/\s+/);
  if (parts.length < 3) return null;
  const day = parseInt(parts[0], 10);
  const month = parts[1];
  const year = parts[2];
  if (Number.isNaN(day)) return null;
  return { day, month, year, monthKey: `${month} ${year}` };
}
 
function weekBucketLabel(day) {
  if (day <= 7) return "สัปดาห์ที่ 1 (1-7)";
  if (day <= 14) return "สัปดาห์ที่ 2 (8-14)";
  if (day <= 21) return "สัปดาห์ที่ 3 (15-21)";
  return "สัปดาห์ที่ 4 (22-31)";
}
 
function formatBaht(n) {
  return n.toLocaleString("th-TH") + " บาท";
}

              <th style={{ textAlign: "right", padding: "9px 16px", fontSize: 11.5, color: theme.textMuted, fontWeight: 600 }}>จำนวน PO</th>
              <th style={{ textAlign: "right", padding: "9px 16px", fontSize: 11.5, color: theme.textMuted, fontWeight: 600 }}>ยอดรวม</th>
            </tr>
          </thead>
          <tbody>
            {poBucketData.map((b) => (
              <tr key={b.label} style={{ borderTop: `1px solid ${theme.border}` }}>
                <td style={{ padding: "10px 16px" }}>{b.label}</td>
                <td style={{ padding: "10px 16px", textAlign: "right" }}>{b.count}</td>
                <td style={{ padding: "10px 16px", textAlign: "right", fontWeight: 600 }}>{formatBaht(b.amount)}</td>
              </tr>
            ))}
            {poBucketData.length === 0 && (
              <tr>
                <td colSpan={3} style={{ padding: "30px 16px", textAlign: "center", color: theme.textMuted }}>ยังไม่มีข้อมูล PO ในช่วงเวลานี้</td>
              </tr>
            )}
          </tbody>
        </table>
      </div>
    </>
  );
}
 
/* ------------------------------------------------------------------ */
/* Generic Google-Sheet-linked view (ประกันรถ, Site Master ฯลฯ)         */
/* ------------------------------------------------------------------ */
 
function GenericSheetView({ theme, inputStyle, module, state, onReload }) {
  const [search, setSearch] = useState("");
 
  if (!module.sheetUrl) {
    return (
      <div style={{ background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 16, padding: 28, boxShadow: theme.shadow, textAlign: "center" }}>
        <FileSpreadsheet size={28} style={{ color: theme.textMuted, marginBottom: 10 }} />
        <h3 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 15, margin: "0 0 6px" }}>ยังไม่ได้เชื่อมต่อ Google Sheet สำหรับ “{module.label}”</h3>
        <p style={{ fontSize: 12.5, color: theme.textMuted, maxWidth: 460, margin: "0 auto" }}>
          เปิดไฟล์ Google Sheet ที่ต้องการ → File → Share → Publish to web → เลือกรูปแบบ CSV แล้วนำลิงก์ไปใส่ในตัวแปร <code>sheetUrl</code>
          ของรายการ <code>{module.id}</code> ใน CUSTOM_SHEETS ที่ต้นไฟล์นี้
        </p>
      </div>
    );
  }
 
  const loading = state && state.loading;
  const error = state && state.error;
  const rows = (state && state.rows) || [];
  const columns = (state && state.columns) || (rows[0] ? Object.keys(rows[0]) : []);
 
  const filteredRows = search.trim()
    ? rows.filter((r) => columns.some((c) => (r[c] || "").toString().toLowerCase().includes(search.trim().toLowerCase())))
    : rows;
 
  return (
    <div style={{ background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 16, boxShadow: theme.shadow, overflow: "hidden" }}>
      <div style={{ padding: 16, display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center", borderBottom: `1px solid ${theme.border}` }}>
        <div style={{ position: "relative", flex: "1 1 220px" }}>
          <Search size={14} style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", color: theme.textMuted }} />
          <input
            value={search}
            onChange={(e) => setSearch(e.target.value)}
            placeholder={`ค้นหาใน ${module.label}...`}
            style={{ ...inputStyle, width: "100%", paddingLeft: 30 }}
          />
        </div>
        <button onClick={onReload} style={{ ...inputStyle, display: "flex", alignItems: "center", gap: 6, cursor: "pointer", color: theme.textMuted }}>
          <RefreshCw size={13} /> โหลดข้อมูลใหม่
        </button>
        <div style={{ fontSize: 12, color: theme.textMuted, marginLeft: "auto" }}>
          {loading ? "กำลังโหลด…" : `พบ ${filteredRows.length} แถว`}
        </div>
      </div>
 
      {error && (
        <div style={{ padding: "10px 16px", fontSize: 12.5, color: "#E2482F", background: "#E2482F1A", borderBottom: `1px solid ${theme.border}` }}>
          โหลดข้อมูลไม่สำเร็จ: {error}
        </div>
      )}
 
      {loading && (
        <div style={{ padding: "40px 16px", textAlign: "center", color: theme.textMuted, fontSize: 13 }}>กำลังโหลดข้อมูลจาก Google Sheet…</div>
      )}
 
      {!loading && columns.length > 0 && (
        <div className="op-scroll" style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead>
              <tr style={{ background: theme.surfaceAlt }}>
                {columns.map((c) => (
                  <th key={c} style={{ textAlign: "left", padding: "10px 14px", fontSize: 11.5, fontWeight: 600, color: theme.textMuted, whiteSpace: "nowrap" }}>{c}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filteredRows.map((r, i) => (
                <tr key={i} className="op-row" style={{ borderTop: `1px solid ${theme.border}` }}>
                  {columns.map((c) => (
                    <td key={c} style={{ padding: "11px 14px", whiteSpace: "nowrap" }}>{(r[c] || "").toString()}</td>
                  ))}
                </tr>
              ))}
              {filteredRows.length === 0 && (
                <tr>
                  <td colSpan={columns.length} style={{ padding: "40px 14px", textAlign: "center", color: theme.textMuted, fontSize: 13 }}>ไม่พบข้อมูล</td>
                </tr>
              )}
            </tbody>
          </table>
        </div>
      )}
 
      {!loading && !error && columns.length === 0 && (
        <div style={{ padding: "40px 16px", textAlign: "center", color: theme.textMuted, fontSize: 13 }}>ยังไม่มีข้อมูลในชีตนี้</div>
      )}
    </div>
  );
}

          >

        </div>
 
        <div className="op-report-grid" style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 14, marginBottom: 26 }}>
          {[

/* Login (client-side gate — see setup notes in chat for limitations)  */
/* ------------------------------------------------------------------ */
 
const AUTH_STORAGE_KEY = "opspulse_authed";
// เปลี่ยนชื่อผู้ใช้ / รหัสผ่านได้ตรงนี้
const APP_USERNAME = "achieve";
const APP_PASSWORD = "Achieve@2026";
 
const loginInputStyle = {
  width: "100%", boxSizing: "border-box", background: "#182339", border: "1px solid #232F49",
  borderRadius: 9, color: "#E7ECF7", fontSize: 14, padding: "10px 12px", outline: "none",
};
 
function LoginScreen({ onLogin }) {
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
 
  const handleSubmit = (e) => {
    e.preventDefault();
    if (username === APP_USERNAME && password === APP_PASSWORD) {
      localStorage.setItem(AUTH_STORAGE_KEY, "1");
      setError("");
      onLogin();
    } else {
      setError("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");
    }
  };
 
  return (
    <div
      style={{
        minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
        background: "#0C1220", fontFamily: "'Inter', sans-serif", padding: 20,
      }}
    >
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap');`}</style>
      <form
        onSubmit={handleSubmit}
        style={{
          width: 340, maxWidth: "100%", background: "#131B2E", border: "1px solid #232F49", borderRadius: 18,
          padding: "36px 32px", boxShadow: "0 20px 60px -20px rgba(0,0,0,0.6)",
        }}
      >
        <div
          style={{
            width: 44, height: 44, borderRadius: 12, background: "#F97316", display: "flex",
            alignItems: "center", justifyContent: "center", color: "#fff",
            fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, marginBottom: 18,
          }}
        >
          AG
        </div>
        <h1 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 20, color: "#fff", margin: "0 0 4px" }}>ACHIEVED GROUP</h1>
        <p style={{ fontSize: 13, color: "#8B96B4", margin: "0 0 24px" }}>เข้าสู่ระบบเพื่อดูแดชบอร์ด</p>
 
        <label style={{ display: "block", fontSize: 12.5, color: "#C6CFE6", marginBottom: 6 }}>ชื่อผู้ใช้</label>
        <input value={username} onChange={(e) => setUsername(e.target.value)} style={loginInputStyle} autoFocus />
 
        <label style={{ display: "block", fontSize: 12.5, color: "#C6CFE6", margin: "16px 0 6px" }}>รหัสผ่าน</label>
        <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} style={loginInputStyle} />
 
        {error && <div style={{ marginTop: 14, fontSize: 12.5, color: "#F87171" }}>{error}</div>}
 
        <button
          type="submit"
          style={{
            marginTop: 22, width: "100%", border: "none", cursor: "pointer", borderRadius: 10,
            padding: "11px 0", fontSize: 14, fontWeight: 700, color: "#fff", background: "#F97316",
            fontFamily: "'Space Grotesk', sans-serif",
          }}
        >
          เข้าสู่ระบบ
        </button>
      </form>
    </div>
  );
}
 
function App() {
  const [authed, setAuthed] = useState(() => localStorage.getItem(AUTH_STORAGE_KEY) === "1");
  if (!authed) return <LoginScreen onLogin={() => setAuthed(true)} />;
  return (
    <Dashboard
      onLogout={() => {
        localStorage.removeItem(AUTH_STORAGE_KEY);
        setAuthed(false);
      }}
    />
  );
}
 
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
