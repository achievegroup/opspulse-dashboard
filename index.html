function resolveColor(theme, key) {
  return STATUS_META[key].color === "ACCENT" ? theme.accent : STATUS_META[key].color;
}
 
function StatusBadge({ status, theme }) {
  const meta = STATUS_META[status];
  const color = resolveColor(theme, status);
  return (
    <span
      style={{
        display: "inline-flex", alignItems: "center", gap: 6, padding: "4px 10px",
        borderRadius: 999, fontSize: 12, fontWeight: 600, color,
        backgroundColor: color + "1A", whiteSpace: "nowrap",
      }}
    >
      <span style={{ width: 6, height: 6, borderRadius: 999, backgroundColor: color }} />
      {meta.label}
    </span>
  );
}
 
function KpiCard({ icon: Icon, label, value, sub, theme, tint }) {
  return (
    <div
      style={{
        background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 16,
        padding: "18px 20px", boxShadow: theme.shadow, flex: 1, minWidth: 0,
      }}
    >
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <span style={{ fontSize: 12.5, fontWeight: 600, color: theme.textMuted, letterSpacing: 0.2 }}>{label}</span>
        <div
          style={{
            width: 30, height: 30, borderRadius: 9, display: "flex", alignItems: "center",
            justifyContent: "center", background: tint + "1E", color: tint,
          }}
        >
          <Icon size={16} strokeWidth={2.3} />
        </div>
      </div>
      <div style={{ marginTop: 10, fontFamily: "'Space Grotesk', sans-serif", fontSize: 30, fontWeight: 700, color: theme.text, lineHeight: 1 }}>
        {value}
      </div>
      <div style={{ marginTop: 6, fontSize: 12, color: theme.textMuted }}>{sub}</div>
    </div>
  );
}

function Dashboard({ onLogout }) {
  const [companyId, setCompanyId] = useState("engpower");
  const [view, setView] = useState("dashboard");
  const [search, setSearch] = useState("");
  const [siteFilter, setSiteFilter] = useState("all");
  const [assigneeFilter, setAssigneeFilter] = useState("all");
  const [statusFilter, setStatusFilter] = useState("all");
  const [reportPeriod, setReportPeriod] = useState("week");
 
  const company = COMPANIES[companyId];
  const theme = company.theme;
 
  const [tasksData, setTasksData] = useState(SAMPLE_TASKS);
  const [loadingTasks, setLoadingTasks] = useState(false);
  const [loadError, setLoadError] = useState("");
 
  useEffect(() => {
    if (!SHEET_CSV_URL) return; // ยังไม่ได้ตั้งค่า Google Sheet ใช้ข้อมูลตัวอย่างต่อไป
    setLoadingTasks(true);
    fetch(SHEET_CSV_URL)
      .then((res) => {
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.text();
      })
      .then((csvText) => {
        const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true });
        const rows = parsed.data
          .map((r) => ({
            id: (r.id || "").toString().trim(),
            company: (r.company || "").toString().trim(),
            site: (r.site || "").toString().trim(),
            title: (r.title || "").toString().trim(),
            type: (r.type || "").toString().trim(),
            assignee: (r.assignee || "").toString().trim(),
            start: (r.start || "").toString().trim(),
            end: (r.end || "").toString().trim(),
            status: (r.status || "").toString().trim(),
          }))
          .filter((r) => r.id);
        if (rows.length) setTasksData(rows);
        setLoadError("");
      })
      .catch((err) => {
        setLoadError("โหลดข้อมูลจาก Google Sheet ไม่สำเร็จ กำลังแสดงข้อมูลตัวอย่างแทน (" + err.message + ")");
      })
      .finally(() => setLoadingTasks(false));
  }, []);
 
  const companyTasks = useMemo(() => tasksData.filter((t) => t.company === companyId), [tasksData, companyId]);
  const sites = useMemo(() => Array.from(new Set(companyTasks.map((t) => t.site))), [companyTasks]);
  const assignees = useMemo(() => Array.from(new Set(companyTasks.map((t) => t.assignee))), [companyTasks]);
 
  const filteredTasks = useMemo(() => {
    return companyTasks.filter((t) => {
      if (siteFilter !== "all" && t.site !== siteFilter) return false;
      if (assigneeFilter !== "all" && t.assignee !== assigneeFilter) return false;
      if (statusFilter !== "all" && t.status !== statusFilter) return false;
      if (search.trim()) {
        const q = search.trim().toLowerCase();
        const hay = `${t.id} ${t.site} ${t.title} ${t.assignee} ${t.type}`.toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }, [companyTasks, siteFilter, assigneeFilter, statusFilter, search]);
 
  const counts = useMemo(() => {
    const c = { total: companyTasks.length, pending: 0, inprogress: 0, completed: 0, overdue: 0 };
    companyTasks.forEach((t) => (c[t.status] += 1));
    return c;
  }, [companyTasks]);
 
  const pieData = ["pending", "inprogress", "completed", "overdue"].map((k) => ({
    key: k, name: STATUS_META[k].label, value: counts[k], color: resolveColor(theme, k),
  }));
 
  const siteData = sites.map((s) => ({
    site: s.length > 22 ? s.slice(0, 20) + "…" : s,

      }}
    >
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap');`}</style>
      <form
        onSubmit={handleSubmit}
        style={{
          width: 340, maxWidth: "100%", background: "#131B2E", border: "1px solid #232F49", borderRadius: 18,
          padding: "36px 32px", boxShadow: "0 20px 60px -20px rgba(0,0,0,0.6)",
        }}
      >
        <div
          style={{
            width: 44, height: 44, borderRadius: 12, background: "#F97316", display: "flex",
            alignItems: "center", justifyContent: "center", color: "#fff",
            fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, marginBottom: 18,
          }}
        >
          OP
        </div>
        <h1 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 20, color: "#fff", margin: "0 0 4px" }}>OpsPulse</h1>
        <p style={{ fontSize: 13, color: "#8B96B4", margin: "0 0 24px" }}>เข้าสู่ระบบเพื่อดูแดชบอร์ด</p>
 
        <label style={{ display: "block", fontSize: 12.5, color: "#C6CFE6", marginBottom: 6 }}>ชื่อผู้ใช้</label>
        <input value={username} onChange={(e) => setUsername(e.target.value)} style={loginInputStyle} autoFocus />
 
        <label style={{ display: "block", fontSize: 12.5, color: "#C6CFE6", margin: "16px 0 6px" }}>รหัสผ่าน</label>
        <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} style={loginInputStyle} />
 
        {error && <div style={{ marginTop: 14, fontSize: 12.5, color: "#F87171" }}>{error}</div>}
 
        <button
          type="submit"
          style={{
            marginTop: 22, width: "100%", border: "none", cursor: "pointer", borderRadius: 10,
            padding: "11px 0", fontSize: 14, fontWeight: 700, color: "#fff", background: "#F97316",
            fontFamily: "'Space Grotesk', sans-serif",
          }}
        >
          เข้าสู่ระบบ
        </button>
      </form>
    </div>
  );
}
 
function App() {
  const [authed, setAuthed] = useState(() => localStorage.getItem(AUTH_STORAGE_KEY) === "1");
  if (!authed) return <LoginScreen onLogin={() => setAuthed(true)} />;
  return (
    <Dashboard
      onLogout={() => {
        localStorage.removeItem(AUTH_STORAGE_KEY);
        setAuthed(false);
      }}
    />
  );
}
 
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
