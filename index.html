function resolveColor(theme, key, meta) {
  const m = (meta || STATUS_META)[key];
  return m.color === "ACCENT" ? theme.accent : m.color;
}

function StatusBadge({ status, theme, meta }) {
  const metaSet = meta || STATUS_META;
  const item = metaSet[status];
  const color = resolveColor(theme, status, metaSet);
  return (
    <span
      style={{
        display: "inline-flex", alignItems: "center", gap: 6, padding: "4px 10px",
        borderRadius: 999, fontSize: 12, fontWeight: 600, color,
        backgroundColor: color + "1A", whiteSpace: "nowrap",
      }}
    >
      <span style={{ width: 6, height: 6, borderRadius: 999, backgroundColor: color }} />
      {item.label}
    </span>
  );
}

function KpiCard({ icon: Icon, label, value, sub, theme, tint }) {
  return (
    <div
      style={{
        background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 16,
        padding: "18px 20px", boxShadow: theme.shadow, flex: 1, minWidth: 0,
      }}
    >
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <span style={{ fontSize: 12.5, fontWeight: 600, color: theme.textMuted, letterSpacing: 0.2 }}>{label}</span>
        <div
          style={{
            width: 30, height: 30, borderRadius: 9, display: "flex", alignItems: "center",
            justifyContent: "center", background: tint + "1E", color: tint,
          }}
        >
          <Icon size={16} strokeWidth={2.3} />
        </div>
      </div>
      <div style={{ marginTop: 10, fontFamily: "'Space Grotesk', sans-serif", fontSize: 30, fontWeight: 700, color: theme.text, lineHeight: 1 }}>
        {value}
      </div>
      <div style={{ marginTop: 6, fontSize: 12, color: theme.textMuted }}>{sub}</div>
    </div>
  );
}

/* ------------------------------------------------------------------ */
/* Thai date helpers (for PO monthly / weekly grouping)                */
/* ------------------------------------------------------------------ */

function parseThaiDate(str) {
  // รูปแบบที่รองรับ: "18 ก.ค. 2569"
  if (!str) return null;
  const parts = str.trim().split(/\s+/);
  if (parts.length < 3) return null;
  const day = parseInt(parts[0], 10);
  const month = parts[1];
  const year = parts[2];
  if (Number.isNaN(day)) return null;
  return { day, month, year, monthKey: `${month} ${year}` };
}

function weekBucketLabel(day) {
  if (day <= 7) return "สัปดาห์ที่ 1 (1-7)";
  if (day <= 14) return "สัปดาห์ที่ 2 (8-14)";
  if (day <= 21) return "สัปดาห์ที่ 3 (15-21)";
  return "สัปดาห์ที่ 4 (22-31)";
}

function formatBaht(n) {
  return n.toLocaleString("th-TH") + " บาท";
}

// รวมแถวรายการ PO (หนึ่งแถว = หนึ่งรายการสินค้า/บริการ) ที่มีเลขที่ PO (id) เดียวกัน
// ให้กลายเป็น "ใบเดียวกัน" — ใช้ทั้งตอนคำนวณสรุปยอด และตอนแสดงรายละเอียดเมื่อคลิกที่ PO
function groupPOsById(list) {
  const map = new Map();
  list.forEach((p) => {
    if (!map.has(p.id)) {
      map.set(p.id, {
        id: p.id, company: p.company, site: p.site, vendor: p.vendor,
        date: p.date, status: p.status, items: [], totalAmount: 0, totalQty: 0,
      });
    }
    const g = map.get(p.id);
    g.items.push(p);
    g.totalAmount += p.amount || 0;
    g.totalQty += p.qty || 0;
  });
  return Array.from(map.values());
}

      })
      .catch((err) => {
        setSitesLoadError("โหลดข้อมูลไซต์งานจาก Google Sheet ไม่สำเร็จ กำลังแสดงข้อมูลตัวอย่างแทน (" + err.message + ")");
      })
      .finally(() => setLoadingSites(false));
  }, []);

  // โหลดข้อมูล PO ตามบริษัทที่กำลังเลือกอยู่ (companyId) — ใช้ useEffect เดียว ไม่ซ้อนกัน
  // เมื่อสลับบริษัท (companyId เปลี่ยน) จะดึง URL ที่ตรงกับบริษัทนั้นจาก PO_SHEET_CSV_URL_BY_COMPANY ให้อัตโนมัติ
  // หมายเหตุ: ชีตสามารถมีหลายแถวที่ id (เลขที่ PO) ซ้ำกันได้ — แต่ละแถวคือหนึ่งรายการสินค้า/บริการ
  // ในใบเดียวกัน ระบบจะรวมแถวเหล่านี้ให้อัตโนมัติตอนแสดงผล (ดูฟังก์ชัน groupPOsById ด้านบน)
  useEffect(() => {
    const url = PO_SHEET_CSV_URL_BY_COMPANY[companyId];
    if (!url) return; // ยังไม่ได้ตั้งค่า Google Sheet สำหรับบริษัทนี้ ใช้ข้อมูลตัวอย่างต่อไป
    setLoadingPos(true);
    setPoLoadError("");
    fetch(url)
      .then((res) => {
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.text();
      })
      .then((csvText) => {
        const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true });
        const rows = parsed.data
          .map((r) => ({
            id: (r.id || "").toString().trim(),
            company: companyId, // เติม company ให้อัตโนมัติตามบริษัทที่กำลังโหลด (ไม่ต้องมีคอลัมน์นี้ในชีตแล้ว)
            site: (r.site || "").toString().trim(),
            vendor: (r.vendor || "").toString().trim(),
            description: (r.description || "").toString().trim(),
            qty: parseFloat((r.qty || "0").toString().replace(/,/g, "")) || 0,
            unit: (r.unit || "").toString().trim(),
            amount: parseFloat((r.amount || "0").toString().replace(/,/g, "")) || 0,
            date: (r.date || "").toString().trim(),
            status: (r.status || "").toString().trim(),
          }))
          .filter((r) => r.id);
        if (rows.length) {
          // แทนที่เฉพาะ PO ของบริษัทนี้ ส่วน PO ของอีกบริษัทที่เคยโหลดไว้แล้วยังอยู่เหมือนเดิม
          setPosData((prev) => [...prev.filter((p) => p.company !== companyId), ...rows]);
        }
      })
      .catch((err) => {
        setPoLoadError("โหลดข้อมูล PO จาก Google Sheet ไม่สำเร็จ กำลังแสดงข้อมูลตัวอย่างแทน (" + err.message + ")");
      })
      .finally(() => setLoadingPos(false));
  }, [companyId]); // <-- สำคัญ: ใส่ companyId เป็น dependency เพื่อให้โหลดใหม่เวลาสลับบริษัท

  // โหลดข้อมูลของเมนู Google Sheet แบบกำหนดเอง (ประกันรถ ฯลฯ) แบบ lazy ตอนเปิดเมนูนั้นครั้งแรก
  // ถ้าโมดูลมี data ฝังอยู่แล้ว (นำเข้าจากไฟล์ Excel) จะใช้ข้อมูลนั้นทันทีโดยไม่ fetch
  useEffect(() => {
    if (!view.startsWith("sheet-")) return;
    const sheetId = view.replace("sheet-", "");
    const module = CUSTOM_SHEETS.find((m) => m.id === sheetId);
    if (!module) return;
    const existing = customSheetState[sheetId];
    if (existing && (existing.loading || existing.loaded)) return;

    if (module.data && module.data.length) {
      const columns = module.columns ? module.columns.map((c) => c.label) : Object.keys(module.data[0]);
      const columnKeys = module.columns ? module.columns.map((c) => c.key) : Object.keys(module.data[0]);
      const rows = module.data.map((row) => {
        const mapped = {};
        columns.forEach((label, i) => { mapped[label] = row[columnKeys[i]]; });
        return mapped;
      });
      setCustomSheetState((prev) => ({ ...prev, [sheetId]: { rows, columns, loading: false, loaded: true, error: "" } }));
      return;
    }

    if (!module.sheetUrl) return;
    setCustomSheetState((prev) => ({ ...prev, [sheetId]: { rows: [], columns: [], loading: true, loaded: false, error: "" } }));
    fetch(module.sheetUrl)
      .then((res) => {
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.text();
      })
      .then((csvText) => {
        const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true });
        const columns = parsed.meta && parsed.meta.fields ? parsed.meta.fields : [];
        setCustomSheetState((prev) => ({
          ...prev,
          [sheetId]: { rows: parsed.data, columns, loading: false, loaded: true, error: "" },
        }));
      })
      .catch((err) => {
        setCustomSheetState((prev) => ({
          ...prev,
          [sheetId]: { rows: [], columns: [], loading: false, loaded: true, error: err.message },
        }));
      });
  }, [view]);

  const reloadCustomSheet = (sheetId) => {
    setCustomSheetState((prev) => {
      const next = { ...prev };
      delete next[sheetId];
      return next;
    });
  };

  const companyTasks = useMemo(() => tasksData.filter((t) => t.company === companyId), [tasksData, companyId]);
  const sites = useMemo(() => Array.from(new Set(companyTasks.map((t) => t.site))), [companyTasks]);
  const assignees = useMemo(() => Array.from(new Set(companyTasks.map((t) => t.assignee))), [companyTasks]);

  const counts = useMemo(() => {
    const c = { total: companyTasks.length, pending: 0, inprogress: 0, completed: 0, overdue: 0 };
    companyTasks.forEach((t) => (c[t.status] += 1));
    return c;
  }, [companyTasks]);

  const pieData = ["pending", "inprogress"].map((k) => ({
    key: k, name: STATUS_META[k].label, value: counts[k], color: resolveColor(theme, k, STATUS_META),
  }));

  const siteData = sites.map((s) => ({
    site: s.length > 22 ? s.slice(0, 20) + "…" : s,
    fullSite: s,
    count: companyTasks.filter((t) => t.site === s).length,
  }));

  // --- PO derived data ---
  // companyPOs = รายการดิบ (หนึ่งแถวต่อหนึ่งรายการสินค้า/บริการ) ของบริษัทที่เลือกอยู่
  const companyPOs = useMemo(() => posData.filter((p) => p.company === companyId), [posData, companyId]);
  // companyPOsGrouped = รวมทุกแถวที่มีเลขที่ PO (id) เดียวกัน ให้กลายเป็น "หนึ่งใบ" พร้อมยอดรวมที่ถูกต้อง
  const companyPOsGrouped = useMemo(() => groupPOsById(companyPOs), [companyPOs]);
  // ตัวเลือกไซต์งานสำหรับตัวกรอง PO อิงตามรายชื่อในแถบ "ไซต์งาน" ของบริษัทที่เลือกอยู่เท่านั้น
  const poSiteOptions = useMemo(() => {
    return Array.from(new Set(sitesData.filter((s) => s.companyId === companyId).map((s) => s.company))).filter(Boolean);
  }, [sitesData, companyId]);

  const filteredPOs = useMemo(() => {
    return companyPOsGrouped.filter((p) => {
      if (poSiteFilter !== "all" && p.site !== poSiteFilter) return false;
      if (poStatusFilter !== "all" && p.status !== poStatusFilter) return false;
      if (poSearch.trim()) {
        const q = poSearch.trim().toLowerCase();
        const itemsText = p.items.map((it) => it.description).join(" ");
        const hay = `${p.id} ${p.site} ${p.vendor} ${itemsText}`.toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }, [companyPOsGrouped, poSiteFilter, poStatusFilter, poSearch]);

  const poCounts = useMemo(() => {
    const c = { total: companyPOsGrouped.length, totalAmount: 0, pending: 0, approved: 0, ordered: 0, paid: 0, cancelled: 0 };
    companyPOsGrouped.forEach((p) => {
      c.totalAmount += p.totalAmount || 0;
      if (c[p.status] !== undefined) c[p.status] += 1;
    });
    return c;
  }, [companyPOsGrouped]);

  const poPieData = ["pending", "approved", "ordered", "paid", "cancelled"].map((k) => {
    const sum = companyPOsGrouped.filter((p) => p.status === k).reduce((a, p) => a + (p.totalAmount || 0), 0);
    return { key: k, name: PO_STATUS_META[k].label, value: sum, color: resolveColor(theme, k, PO_STATUS_META) };
  });

  const poBucketData = useMemo(() => {
    const buckets = {};
    companyPOs.forEach((p) => {
      const d = parseThaiDate(p.date);
      if (!d) return;
      const key = poSummaryPeriod === "month" ? d.monthKey : `${d.month} · ${weekBucketLabel(d.day)}`;
      if (!buckets[key]) buckets[key] = { label: key, amount: 0, count: 0, sortDay: d.day, sortMonth: d.monthKey };
      buckets[key].amount += p.amount || 0;
      buckets[key].count += 1;
    });
    return Object.values(buckets).sort((a, b) => (a.sortMonth > b.sortMonth ? 1 : a.sortMonth < b.sortMonth ? -1 : a.sortDay - b.sortDay));
  }, [companyPOs, poSummaryPeriod]);

  // --- Site (Master Site) derived data — กรองเฉพาะไซต์งานของบริษัทที่เลือกอยู่ ---
  const companySites = useMemo(() => sitesData.filter((s) => s.companyId === companyId), [sitesData, companyId]);

  const filteredSites = useMemo(() => {
    if (!siteSearch.trim()) return companySites;
    const q = siteSearch.trim().toLowerCase();
    return companySites.filter((s) => {
      const hay = `${s.id} ${s.company} ${s.type} ${s.address} ${s.coordinator} ${s.phone}`.toLowerCase();
      return hay.includes(q);
    });
  }, [companySites, siteSearch]);

  // --- Insurance (ประกันรถ) derived summary ---
  const insuranceSummary = useMemo(() => {
    const list = SAMPLE_INSURANCE;
    const total = list.length;
    const taxSoon = list.filter((v) => v.taxDaysLeft !== "" && v.taxDaysLeft !== undefined && Number(v.taxDaysLeft) <= 30).length;
    const actSoon = list.filter((v) => v.actDaysLeft !== "" && v.actDaysLeft !== undefined && Number(v.actDaysLeft) <= 30).length;
    const insSoon = list.filter((v) => v.insDaysLeft !== "" && v.insDaysLeft !== undefined && Number(v.insDaysLeft) <= 30).length;
    const noIns = list.filter((v) => !v.insClass || v.insClass === "-").length;
    return { total, taxSoon, actSoon, insSoon, noIns };
  }, []);

  // --- Insurance (ประกันรถ) expiring-soon detail list (สำหรับแสดงในหน้าแดชบอร์ด) ---
  const insuranceExpiringSoon = useMemo(() => {
    const rows = [];
    SAMPLE_INSURANCE.forEach((v) => {
      if (v.taxDaysLeft !== "" && v.taxDaysLeft !== undefined && Number(v.taxDaysLeft) <= 30) {
        rows.push({ plate: v.plate, model: v.model, item: "ภาษี", expiry: v.taxExpiry, daysLeft: Number(v.taxDaysLeft) });
      }
      if (v.actDaysLeft !== "" && v.actDaysLeft !== undefined && Number(v.actDaysLeft) <= 30) {
        rows.push({ plate: v.plate, model: v.model, item: "พรบ.", expiry: v.actExpiry, daysLeft: Number(v.actDaysLeft) });
      }
      if (v.insDaysLeft !== "" && v.insDaysLeft !== undefined && Number(v.insDaysLeft) <= 30) {
        rows.push({ plate: v.plate, model: v.model, item: "ประกันภัย", expiry: v.insExpiry, daysLeft: Number(v.insDaysLeft) });
      }
    });
    return rows.sort((a, b) => a.daysLeft - b.daysLeft);
  }, []);

  const clearPoFilters = () => {
    setPoSearch(""); setPoSiteFilter("all"); setPoStatusFilter("all");
  };

  const NAV_ITEMS = [
    { id: "dashboard", label: "แดชบอร์ด", icon: LayoutDashboard },
    { id: "sites", label: "ไซต์งาน", icon: Building2 },
    { id: "po", label: "รายการ PO", icon: Receipt },
    ...CUSTOM_SHEETS.filter((m) => !m.company || m.company === companyId).map((m) => ({
      id: `sheet-${m.id}`,
      label: m.label,
      icon: ICONS_BY_NAME[m.icon] || FileSpreadsheet,
    })),
  ];

  const inputStyle = {
    background: theme.surfaceAlt, border: `1px solid ${theme.border}`, borderRadius: 10,
    color: theme.text, fontSize: 13.5, padding: "8px 12px", outline: "none",
  };

  const activeSheetModule = view.startsWith("sheet-") ? CUSTOM_SHEETS.find((m) => m.id === view.replace("sheet-", "")) : null;

  return (
    <div
      className="op-app"
      style={{
        fontFamily: "'Inter', sans-serif", background: theme.bg, color: theme.text,
        minHeight: "100%", display: "flex", transition: "background 0.35s ease, color 0.35s ease",
      }}
    >
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; }
        .op-sel { appearance: none; -webkit-appearance: none; }
        .op-scroll::-webkit-scrollbar { height: 6px; width: 6px; }
        .op-scroll::-webkit-scrollbar-thumb { background: ${theme.border}; border-radius: 10px; }
        .op-row:hover { background: ${theme.surfaceAlt} !important; }
        .op-navbtn:hover { background: ${theme.sidebarActive} !important; }
        @media print {
          .no-print { display: none !important; }
          .print-area { padding: 0 !important; }
        }
        /* --- Embed-friendly responsive breakpoints (for Google Sites iframes) --- */
        @media (max-width: 860px) {
          .op-app { flex-direction: column !important; }
          .op-sidebar {
            width: 100% !important; height: auto !important; position: relative !important;
            flex-direction: row !important; flex-wrap: wrap; align-items: center !important;
            padding: 12px 14px !important; gap: 10px !important;
          }
          .op-brand-row { padding: 0 !important; flex: 0 0 auto; }
          .op-switcher { margin-bottom: 0 !important; flex: 1 1 220px; }
          .op-nav { flex-direction: row !important; flex-wrap: wrap; gap: 6px !important; flex: 1 1 100%; }
          .op-footer { display: none !important; }
          .op-main { padding: 18px 16px 40px !important; }
        }
        @media (max-width: 520px) {
          .kpi-row { flex-direction: column !important; }
          .op-report-grid { grid-template-columns: repeat(2, 1fr) !important; }
        }
      `}</style>

      <aside
        className="no-print op-sidebar"
        style={{
          width: 232, flexShrink: 0, background: theme.sidebarBg, color: theme.sidebarText,
          display: "flex", flexDirection: "column", padding: "20px 14px",
          position: "sticky", top: 0, height: "100vh",
        }}
      >
        <div className="op-brand-row" style={{ display: "flex", alignItems: "center", gap: 10, padding: "0 6px 20px" }}>
          <div
            style={{
              width: 34, height: 34, borderRadius: 9, background: theme.primary,
              display: "flex", alignItems: "center", justifyContent: "center",
              color: "#fff", fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: 13,
            }}
          >
            {company.monogram}
          </div>
          <div>
            <div style={{ fontSize: 12.5, fontWeight: 700, color: "#fff", fontFamily: "'Space Grotesk', sans-serif" }}>ACHIEVED GROUP</div>
            <div style={{ fontSize: 10.5, color: theme.sidebarMuted }}>Task &amp; Executive View</div>
          </div>
        </div>

        <div className="op-switcher" style={{ background: "rgba(255,255,255,0.05)", borderRadius: 12, padding: 4, display: "flex", gap: 4, marginBottom: 22 }}>
          {Object.values(COMPANIES).map((c) => {
            const active = c.id === companyId;
            return (
              <button
                key={c.id}
                onClick={() => setCompanyId(c.id)}
                style={{
                  flex: 1, border: "none", cursor: "pointer", borderRadius: 9, padding: "8px 6px",
                  fontSize: 11.5, fontWeight: 600, fontFamily: "'Space Grotesk', sans-serif",
                  background: active ? COMPANIES[c.id].theme.primary : "transparent",
                  color: active ? "#fff" : theme.sidebarMuted, transition: "all 0.2s ease",
                }}
              >
                {c.shortName}
              </button>
            );
          })}
        </div>

        <nav className="op-nav op-scroll" style={{ display: "flex", flexDirection: "column", gap: 3, overflowY: "auto" }}>
          {NAV_ITEMS.map((item) => {
            const Icon = item.icon;
            const active = view === item.id;
            return (
              <button
                key={item.id}
                className="op-navbtn"
                onClick={() => setView(item.id)}
                style={{
                  display: "flex", alignItems: "center", gap: 10, border: "none", cursor: "pointer",
                  borderRadius: 10, padding: "10px 12px", fontSize: 13.5, fontWeight: 500, textAlign: "left",
                  background: active ? theme.sidebarActive : "transparent",
                  color: active ? "#fff" : theme.sidebarText, transition: "background 0.15s ease",
                }}
              >
                <Icon size={16} strokeWidth={2.2} />
                {item.label}
              </button>
            );
          })}
        </nav>

        <div className="op-footer" style={{ marginTop: "auto", padding: "14px 12px", borderRadius: 12, background: "rgba(255,255,255,0.04)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: theme.sidebarMuted, marginBottom: 6 }}>
            <Sparkles size={12} /> กำลังดูข้อมูลของ
          </div>
          <div style={{ fontSize: 12.5, fontWeight: 600, color: "#fff", lineHeight: 1.4 }}>{company.name}</div>
        </div>
      </aside>

      <main className="print-area op-main" style={{ flex: 1, minWidth: 0, padding: "26px 32px 60px" }}>
        <div className="no-print" style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 26 }}>
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: 0.6, color: theme.primary, textTransform: "uppercase", marginBottom: 4 }}>
              {company.shortName}
            </div>
            <h1 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 22, fontWeight: 700, margin: 0 }}>
              {view === "dashboard" && company.name}
              {view === "sites" && "ไซต์งานทั้งหมด"}
              {view === "po" && "รายการใบสั่งซื้อ (PO)"}
              {activeSheetModule && activeSheetModule.label}
            </h1>
            <p style={{ fontSize: 13, color: theme.textMuted, margin: "4px 0 0" }}>{company.tagline}</p>
          </div>
          <button
            onClick={onLogout}
            style={{
              border: `1px solid ${theme.border}`, background: theme.surface, color: theme.textMuted,
              borderRadius: 10, padding: "8px 14px", fontSize: 12.5, fontWeight: 600, cursor: "pointer",
            }}
          >
            ออกจากระบบ
          </button>
        </div>

        {loadingTasks && (
          <div className="no-print" style={{ marginBottom: 16, fontSize: 12.5, color: theme.textMuted }}>
            กำลังโหลดข้อมูลล่าสุดจาก Google Sheet…
          </div>
        )}
        {loadError && (
          <div
            className="no-print"
            style={{
              marginBottom: 16, padding: "10px 14px", borderRadius: 10, fontSize: 12.5,
              background: "#E2482F1A", color: "#E2482F", border: "1px solid #E2482F33",
            }}
          >
            {loadError}
          </div>
        )}

        {view === "dashboard" && (
          <DashboardView
            theme={theme} counts={counts} pieData={pieData} siteData={siteData}
            poCounts={poCounts} poPieData={poPieData} poBucketData={poBucketData}
            poSummaryPeriod={poSummaryPeriod} setPoSummaryPeriod={setPoSummaryPeriod}
            totalSites={companySites.length} insuranceSummary={insuranceSummary}
            insuranceExpiringSoon={insuranceExpiringSoon}
          />
        )}

        {view === "sites" && (
          <SitesView
            theme={theme} inputStyle={inputStyle}
            search={siteSearch} setSearch={setSiteSearch}
            filteredSites={filteredSites}
            loading={loadingSites} error={sitesLoadError}
          />
        )}

        {view === "po" && (
          <POListView
            theme={theme} inputStyle={inputStyle} sites={poSiteOptions}
            search={poSearch} setSearch={setPoSearch}
            siteFilter={poSiteFilter} setSiteFilter={setPoSiteFilter}
            statusFilter={poStatusFilter} setStatusFilter={setPoStatusFilter}
            clearFilters={clearPoFilters} filteredPOs={filteredPOs}
            loading={loadingPos} error={poLoadError}
            onSelectPO={setSelectedPO}
          />
        )}

        {activeSheetModule && (
          <GenericSheetView
            theme={theme} inputStyle={inputStyle} module={activeSheetModule}
            state={customSheetState[activeSheetModule.id]}
            onReload={() => reloadCustomSheet(activeSheetModule.id)}
          />
        )}
      </main>

      <PODetailModal theme={theme} po={selectedPO} onClose={() => setSelectedPO(null)} />
    </div>
  );
}

/* ------------------------------------------------------------------ */
/* Dashboard view                                                      */
/* ------------------------------------------------------------------ */

function DashboardView({
  theme, counts, pieData, siteData,
  poCounts, poPieData, poBucketData, poSummaryPeriod, setPoSummaryPeriod,
  totalSites, insuranceSummary, insuranceExpiringSoon,
}) {
  const outstandingPO = poCounts.pending + poCounts.approved + poCounts.ordered;
  return (
    <>
      <div className="kpi-row" style={{ display: "flex", gap: 16, marginBottom: 22, flexWrap: "wrap" }}>
        <KpiCard icon={ListTodo} label="งานทั้งหมด" value={counts.total} sub="ทุกไซต์งาน" theme={theme} tint={theme.primary} />
        <KpiCard icon={Clock} label="กำลังดำเนินการ" value={counts.inprogress} sub="อยู่ระหว่างปฏิบัติงาน" theme={theme} tint={theme.accent} />
      </div>

      <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
        <div style={{ flex: "1 1 340px", background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 16, padding: 20, boxShadow: theme.shadow }}>
          <h3 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 14.5, margin: "0 0 4px" }}>สัดส่วนสถานะงาน</h3>
          <p style={{ fontSize: 12, color: theme.textMuted, margin: "0 0 8px" }}>Task Status Breakdown</p>
          <div style={{ height: 230 }}>
            <ResponsiveContainer width="100%" height="100%">
              <PieChart>
                <Pie data={pieData} dataKey="value" nameKey="name" innerRadius={54} outerRadius={82} paddingAngle={3} strokeWidth={0}>

                </tr>
              </thead>
              <tbody>
                {insuranceExpiringSoon.map((r, i) => (
                  <tr key={i} className="op-row" style={{ borderTop: `1px solid ${theme.border}` }}>

/* Sites view (ไซต์งาน — จากไฟล์ Master Site)                          */

function SitesView({ theme, inputStyle, search, setSearch, filteredSites, loading, error }) {
  return (
    <div style={{ background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 16, boxShadow: theme.shadow, overflow: "hidden" }}>
      {loading && (
        <div style={{ padding: "10px 16px", fontSize: 12.5, color: theme.textMuted, borderBottom: `1px solid ${theme.border}` }}>
          กำลังโหลดข้อมูลไซต์งานล่าสุดจาก Google Sheet…
        </div>
      )}
      {error && (
        <div style={{ padding: "10px 16px", fontSize: 12.5, color: "#E2482F", background: "#E2482F1A", borderBottom: `1px solid ${theme.border}` }}>
          {error}
        </div>
      )}
      <div style={{ padding: 16, display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center", borderBottom: `1px solid ${theme.border}` }}>
        <div style={{ position: "relative", flex: "1 1 220px" }}>
          <Search size={14} style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", color: theme.textMuted }} />
          <input
            value={search}
            onChange={(e) => setSearch(e.target.value)}
            placeholder="ค้นหาไซต์งาน, ผู้ประสานงาน, ที่อยู่..."
            style={{ ...inputStyle, width: "100%", paddingLeft: 30 }}
          />
        </div>
        <div style={{ fontSize: 12, color: theme.textMuted, marginLeft: "auto" }}>พบ {filteredSites.length} ไซต์งาน</div>
      </div>

      <div className="op-scroll" style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
          <thead>
            <tr style={{ background: theme.surfaceAlt }}>
              {["ID", "ชื่อไซต์งาน / ลูกค้า", "ประเภท", "ที่อยู่", "ผู้ประสานงาน", "เบอร์ติดต่อ", "เริ่มสัญญา", "หมดสัญญา", "คงเหลือ (วัน)", "สถานะ"].map((h) => (
                <th key={h} style={{ textAlign: "left", padding: "10px 14px", fontSize: 11.5, fontWeight: 600, color: theme.textMuted, whiteSpace: "nowrap" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filteredSites.map((s) => (
              <tr key={s.id} className="op-row" style={{ borderTop: `1px solid ${theme.border}`, transition: "background 0.1s ease" }}>
                <td style={{ padding: "11px 14px", fontFamily: "'Space Grotesk', sans-serif", fontWeight: 600, color: theme.primary, whiteSpace: "nowrap" }}>{s.id}</td>
                <td style={{ padding: "11px 14px", maxWidth: 260, color: theme.text }}>{s.company}</td>
                <td style={{ padding: "11px 14px", whiteSpace: "nowrap", color: theme.textMuted }}>{s.type}</td>
                <td style={{ padding: "11px 14px", maxWidth: 280, color: theme.textMuted, fontSize: 12.5 }}>{s.address}</td>
                <td style={{ padding: "11px 14px", whiteSpace: "nowrap" }}>{s.coordinator}</td>
                <td style={{ padding: "11px 14px", whiteSpace: "nowrap" }}>{s.phone}</td>
                <td style={{ padding: "11px 14px", whiteSpace: "nowrap", color: theme.textMuted, fontSize: 12.5 }}>{s.contractStart || "—"}</td>
                <td style={{ padding: "11px 14px", whiteSpace: "nowrap", color: theme.textMuted, fontSize: 12.5 }}>{s.contractEnd || "—"}</td>
                <td style={{ padding: "11px 14px", whiteSpace: "nowrap" }}>{s.daysLeft !== "" ? s.daysLeft : "—"}</td>
                <td style={{ padding: "11px 14px" }}>
                  <span
                    style={{
                      display: "inline-flex", alignItems: "center", gap: 6, padding: "4px 10px",
                      borderRadius: 999, fontSize: 12, fontWeight: 600, color: "#22A559",
                      backgroundColor: "#22A5591A", whiteSpace: "nowrap",
                    }}
                  >
                    <span style={{ width: 6, height: 6, borderRadius: 999, backgroundColor: "#22A559" }} />
                    {s.status}
                  </span>
                </td>
              </tr>
            ))}
            {filteredSites.length === 0 && (
              <tr>
                <td colSpan={10} style={{ padding: "40px 14px", textAlign: "center", color: theme.textMuted, fontSize: 13 }}>
                  ไม่พบไซต์งานที่ตรงกับคำค้นหา ลองปรับคำค้นหาใหม่
                </td>
              </tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* PO (Purchase Order) list view                                       */
/* หนึ่งแถวในตารางนี้ = หนึ่งใบ PO (รวมทุกรายการที่มี id เดียวกันแล้ว)     */
/* คลิกที่แถวเพื่อเปิดรายละเอียดรายการย่อยทั้งหมดในใบเดียวกัน (PODetailModal) */
/* ------------------------------------------------------------------ */

function POListView({
  theme, inputStyle, sites,
  search, setSearch, siteFilter, setSiteFilter,
  statusFilter, setStatusFilter, clearFilters, filteredPOs,
  loading, error, onSelectPO,
}) {
  const totalAmount = filteredPOs.reduce((a, p) => a + (p.totalAmount || 0), 0);
  return (
    <div style={{ background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 16, boxShadow: theme.shadow, overflow: "hidden" }}>
      {loading && (
        <div style={{ padding: "10px 16px", fontSize: 12.5, color: theme.textMuted, borderBottom: `1px solid ${theme.border}` }}>
          กำลังโหลดข้อมูล PO ล่าสุดจาก Google Sheet…
        </div>
      )}
      {error && (
        <div style={{ padding: "10px 16px", fontSize: 12.5, color: "#E2482F", background: "#E2482F1A", borderBottom: `1px solid ${theme.border}` }}>
          {error}
        </div>
      )}
      <div style={{ padding: 16, display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center", borderBottom: `1px solid ${theme.border}` }}>
        <div style={{ position: "relative", flex: "1 1 220px" }}>
          <Search size={14} style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", color: theme.textMuted }} />
          <input
            value={search}
            onChange={(e) => setSearch(e.target.value)}
            placeholder="ค้นหาเลข PO, ไซต์งาน, ผู้ขาย, รายการ..."
            style={{ ...inputStyle, width: "100%", paddingLeft: 30 }}
          />
        </div>
        <select className="op-sel" value={siteFilter} onChange={(e) => setSiteFilter(e.target.value)} style={{ ...inputStyle, minWidth: 220 }}>
          <option value="all">ทุกไซต์งาน</option>
          {sites.map((s) => <option key={s} value={s}>{s}</option>)}
        </select>
        <select className="op-sel" value={statusFilter} onChange={(e) => setStatusFilter(e.target.value)} style={{ ...inputStyle, minWidth: 150 }}>
          <option value="all">ทุกสถานะ PO</option>
          {Object.entries(PO_STATUS_META).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
        </select>
        <button onClick={clearFilters} style={{ ...inputStyle, display: "flex", alignItems: "center", gap: 5, cursor: "pointer", color: theme.textMuted }}>
          <X size={13} /> ล้างตัวกรอง
        </button>
        <div style={{ fontSize: 12, color: theme.textMuted, marginLeft: "auto", textAlign: "right" }}>
          พบ {filteredPOs.length} ใบ · รวม {formatBaht(totalAmount)}
        </div>
      </div>

      <div className="op-scroll" style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
          <thead>
            <tr style={{ background: theme.surfaceAlt }}>
              {["เลขที่ PO", "ไซต์งาน", "ผู้ขาย / ร้านค้า", "รายการ", "จำนวนรายการ", "จำนวนเงินรวม", "วันที่สั่งซื้อ", "สถานะ"].map((h) => (
                <th key={h} style={{ textAlign: "left", padding: "10px 14px", fontSize: 11.5, fontWeight: 600, color: theme.textMuted, whiteSpace: "nowrap" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filteredPOs.map((p) => (
              <tr
                key={p.id}
                className="op-row"
                onClick={() => onSelectPO(p)}
                style={{ borderTop: `1px solid ${theme.border}`, transition: "background 0.1s ease", cursor: "pointer" }}
                title="คลิกเพื่อดูรายการทั้งหมดในใบนี้"
              >
                <td style={{ padding: "11px 14px", fontFamily: "'Space Grotesk', sans-serif", fontWeight: 600, color: theme.primary, whiteSpace: "nowrap" }}>{p.id}</td>
                <td style={{ padding: "11px 14px", maxWidth: 200 }}>{p.site}</td>
                <td style={{ padding: "11px 14px", whiteSpace: "nowrap" }}>{p.vendor}</td>
                <td style={{ padding: "11px 14px", maxWidth: 260, color: theme.text }}>
                  {p.items[0].description}
                  {p.items.length > 1 && (
                    <span style={{ color: theme.textMuted, fontSize: 12 }}> +{p.items.length - 1} รายการ</span>
                  )}
                </td>
                <td style={{ padding: "11px 14px", whiteSpace: "nowrap", textAlign: "right" }}>{p.items.length}</td>
                <td style={{ padding: "11px 14px", whiteSpace: "nowrap", fontWeight: 600 }}>{formatBaht(p.totalAmount || 0)}</td>
                <td style={{ padding: "11px 14px", whiteSpace: "nowrap", color: theme.textMuted, fontSize: 12.5 }}>{p.date}</td>
                <td style={{ padding: "11px 14px" }}><StatusBadge status={p.status} theme={theme} meta={PO_STATUS_META} /></td>
              </tr>
            ))}
            {filteredPOs.length === 0 && (
              <tr>
                <td colSpan={8} style={{ padding: "40px 14px", textAlign: "center", color: theme.textMuted, fontSize: 13 }}>
                  ไม่พบ PO ที่ตรงกับตัวกรองที่เลือก ลองปรับเงื่อนไขการค้นหาใหม่
                </td>
              </tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

        <div style={{ border: `1px solid ${theme.border}`, borderRadius: 12, overflow: "hidden" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead>
              <tr style={{ background: theme.surfaceAlt }}>
                {["รายการ", "จำนวน", "จำนวนเงิน"].map((h) => (
                  <th key={h} style={{ textAlign: "left", padding: "8px 12px", fontSize: 11.5, fontWeight: 600, color: theme.textMuted }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {po.items.map((it, i) => (
                <tr key={i} style={{ borderTop: `1px solid ${theme.border}` }}>
                  <td style={{ padding: "9px 12px" }}>{it.description}</td>
                  <td style={{ padding: "9px 12px", textAlign: "right" }}>{it.qty || "-"}{it.unit ? ` ${it.unit}` : ""}</td>
                  <td style={{ padding: "9px 12px", textAlign: "right", fontWeight: 600 }}>{formatBaht(it.amount || 0)}</td>
                </tr>
              ))}
            </tbody>
            <tfoot>
              <tr style={{ borderTop: `2px solid ${theme.border}` }}>
                <td colSpan={2} style={{ padding: "10px 12px", fontWeight: 700 }}>รวมทั้งใบ</td>
                <td style={{ padding: "10px 12px", textAlign: "right", fontWeight: 700, color: theme.primary }}>{formatBaht(po.totalAmount)}</td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ------------------------------------------------------------------ */
/* Generic Google-Sheet-linked view (ประกันรถ ฯลฯ)                      */
/* ------------------------------------------------------------------ */

function GenericSheetView({ theme, inputStyle, module, state, onReload }) {
  const [search, setSearch] = useState("");

  if (!module.sheetUrl && !(module.data && module.data.length)) {
    return (
      <div style={{ background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 16, padding: 28, boxShadow: theme.shadow, textAlign: "center" }}>
        <FileSpreadsheet size={28} style={{ color: theme.textMuted, marginBottom: 10 }} />
        <h3 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 15, margin: "0 0 6px" }}>ยังไม่มีข้อมูลสำหรับ "{module.label}"</h3>
        <p style={{ fontSize: 12.5, color: theme.textMuted, maxWidth: 460, margin: "0 auto" }}>
          เพิ่มข้อมูลได้โดยใส่ array ใน <code>data</code> หรือเชื่อมต่อ Google Sheet ผ่าน <code>sheetUrl</code>
          ของรายการ <code>{module.id}</code> ใน CUSTOM_SHEETS ที่ต้นไฟล์นี้
        </p>
      </div>
    );
  }

  const loading = state && state.loading;
  const error = state && state.error;
  const rows = (state && state.rows) || [];
  const columns = (state && state.columns) || (rows[0] ? Object.keys(rows[0]) : []);

  const filteredRows = search.trim()
    ? rows.filter((r) => columns.some((c) => (r[c] || "").toString().toLowerCase().includes(search.trim().toLowerCase())))
    : rows;

  return (
    <div style={{ background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 16, boxShadow: theme.shadow, overflow: "hidden" }}>
      <div style={{ padding: 16, display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center", borderBottom: `1px solid ${theme.border}` }}>
        <div style={{ position: "relative", flex: "1 1 220px" }}>
          <Search size={14} style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", color: theme.textMuted }} />
          <input
            value={search}
            onChange={(e) => setSearch(e.target.value)}
            placeholder={`ค้นหาใน ${module.label}...`}
            style={{ ...inputStyle, width: "100%", paddingLeft: 30 }}
          />
        </div>
        {module.sheetUrl && (
          <button onClick={onReload} style={{ ...inputStyle, display: "flex", alignItems: "center", gap: 6, cursor: "pointer", color: theme.textMuted }}>
            <RefreshCw size={13} /> โหลดข้อมูลใหม่
          </button>
        )}
        <div style={{ fontSize: 12, color: theme.textMuted, marginLeft: "auto" }}>
          {loading ? "กำลังโหลด…" : `พบ ${filteredRows.length} แถว`}
        </div>
      </div>

      {error && (
        <div style={{ padding: "10px 16px", fontSize: 12.5, color: "#E2482F", background: "#E2482F1A", borderBottom: `1px solid ${theme.border}` }}>
          โหลดข้อมูลไม่สำเร็จ: {error}
        </div>
      )}

      {loading && (
        <div style={{ padding: "40px 16px", textAlign: "center", color: theme.textMuted, fontSize: 13 }}>กำลังโหลดข้อมูลจาก Google Sheet…</div>
      )}

      {!loading && columns.length > 0 && (
        <div className="op-scroll" style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead>
              <tr style={{ background: theme.surfaceAlt }}>
                {columns.map((c) => (
                  <th key={c} style={{ textAlign: "left", padding: "10px 14px", fontSize: 11.5, fontWeight: 600, color: theme.textMuted, whiteSpace: "nowrap" }}>{c}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filteredRows.map((r, i) => (
                <tr key={i} className="op-row" style={{ borderTop: `1px solid ${theme.border}` }}>
                  {columns.map((c) => (
                    <td key={c} style={{ padding: "11px 14px", whiteSpace: "nowrap" }}>{(r[c] || "").toString()}</td>
                  ))}
                </tr>
              ))}
              {filteredRows.length === 0 && (
                <tr>
                  <td colSpan={columns.length} style={{ padding: "40px 14px", textAlign: "center", color: theme.textMuted, fontSize: 13 }}>ไม่พบข้อมูล</td>
                </tr>
              )}
            </tbody>
          </table>
        </div>
      )}

      {!loading && !error && columns.length === 0 && (
        <div style={{ padding: "40px 16px", textAlign: "center", color: theme.textMuted, fontSize: 13 }}>ยังไม่มีข้อมูลในชีตนี้</div>
      )}
    </div>
  );
}

/* Login (client-side gate — see setup notes in chat for limitations)  */
/* ------------------------------------------------------------------ */

const AUTH_STORAGE_KEY = "opspulse_authed";
// เปลี่ยนชื่อผู้ใช้ / รหัสผ่านได้ตรงนี้
const APP_USERNAME = "achieve";
const APP_PASSWORD = "Achieve@2026";

const loginInputStyle = {
  width: "100%", boxSizing: "border-box", background: "#182339", border: "1px solid #232F49",
  borderRadius: 9, color: "#E7ECF7", fontSize: 14, padding: "10px 12px", outline: "none",
};

function LoginScreen({ onLogin }) {
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");

  const handleSubmit = (e) => {
    e.preventDefault();
    if (username === APP_USERNAME && password === APP_PASSWORD) {
      localStorage.setItem(AUTH_STORAGE_KEY, "1");
      setError("");
      onLogin();
    } else {
      setError("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");
    }
  };

  return (
    <div
      style={{
        minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
        background: "#0C1220", fontFamily: "'Inter', sans-serif", padding: 20,
      }}
    >
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap');`}</style>
      <form
        onSubmit={handleSubmit}
        style={{
          width: 340, maxWidth: "100%", background: "#131B2E", border: "1px solid #232F49", borderRadius: 18,
          padding: "36px 32px", boxShadow: "0 20px 60px -20px rgba(0,0,0,0.6)",
        }}
      >
        <div
          style={{
            width: 44, height: 44, borderRadius: 12, background: "#F97316", display: "flex",
            alignItems: "center", justifyContent: "center", color: "#fff",
            fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, marginBottom: 18,
          }}
        >
          AG
        </div>
        <h1 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 20, color: "#fff", margin: "0 0 4px" }}>ACHIEVED GROUP</h1>
        <p style={{ fontSize: 13, color: "#8B96B4", margin: "0 0 24px" }}>เข้าสู่ระบบเพื่อดูแดชบอร์ด</p>

        <label style={{ display: "block", fontSize: 12.5, color: "#C6CFE6", marginBottom: 6 }}>ชื่อผู้ใช้</label>
        <input value={username} onChange={(e) => setUsername(e.target.value)} style={loginInputStyle} autoFocus />

        <label style={{ display: "block", fontSize: 12.5, color: "#C6CFE6", margin: "16px 0 6px" }}>รหัสผ่าน</label>
        <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} style={loginInputStyle} />

        {error && <div style={{ marginTop: 14, fontSize: 12.5, color: "#F87171" }}>{error}</div>}

        <button
          type="submit"
          style={{
            marginTop: 22, width: "100%", border: "none", cursor: "pointer", borderRadius: 10,
            padding: "11px 0", fontSize: 14, fontWeight: 700, color: "#fff", background: "#F97316",
            fontFamily: "'Space Grotesk', sans-serif",
          }}
        >
          เข้าสู่ระบบ
        </button>
      </form>
    </div>
  );
}

function App() {
  const [authed, setAuthed] = useState(() => localStorage.getItem(AUTH_STORAGE_KEY) === "1");
  if (!authed) return <LoginScreen onLogin={() => setAuthed(true)} />;
  return (
    <Dashboard
      onLogout={() => {
        localStorage.removeItem(AUTH_STORAGE_KEY);
        setAuthed(false);
      }}
    />
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
